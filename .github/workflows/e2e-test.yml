name: E2E Tests

on:
  push:
    branches: [main, develop, 'codex/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  e2e:
    name: E2E Release Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        otp: ['28']
        elixir: ['1.18']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: ${{ runner.os }}-e2e-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          MIX_ENV=prod mix deps.get

      - name: Start EPMD
        run: epmd -daemon

      - name: Run E2E tests
        run: ./e2e_test/scripts/run_e2e.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.otp }}-${{ matrix.elixir }}
          path: _build/e2e_data/
