name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 3.0.0-beta.1)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  version:
    name: Determine release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${INPUT_VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

  test:
    name: Test release packages
    runs-on: ubuntu-latest
    needs: version
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            apps/ex_turso/native/ex_turso/target
          key: ${{ runner.os }}-mix-release-${{ needs.version.outputs.version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-release-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Set every app to the release version
        run: scripts/set_release_version.sh "${{ needs.version.outputs.version }}"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile project
        run: MIX_ENV=test mix compile --force --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Validate standalone Hex packages
        run: bash scripts/check_hex_packages.sh

  publish:
    name: Publish all packages
    runs-on: ubuntu-latest
    needs: [version, test]
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            apps/ex_turso/native/ex_turso/target
          key: ${{ runner.os }}-mix-release-${{ needs.version.outputs.version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-release-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Set every app to the Concord release version
        run: scripts/set_release_version.sh "${{ needs.version.outputs.version }}"

      - name: Install umbrella dependencies
        run: mix deps.get

      - name: Publish every dependency package to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: |
          for app_dir in apps/*; do
            if [[ ! -f "$app_dir/mix.exs" || "$(basename "$app_dir")" == "concord" ]]; then
              continue
            fi

            echo "Publishing $(basename "$app_dir") ${{ needs.version.outputs.version }}"
            (cd "$app_dir" && mix hex.publish --yes)
          done

      - name: Resolve the newly published Concord dependencies
        env:
          CONCORD_HEX_BUILD: '1'
          MIX_ENV: prod
        working-directory: apps/concord
        run: |
          for attempt in $(seq 1 12); do
            mix hex.repo update

            if mix deps.get; then
              exit 0
            fi

            if [[ "$attempt" -eq 12 ]]; then
              echo "same-version Hex dependencies did not become available" >&2
              exit 1
            fi

            sleep 10
          done

      - name: Generate Concord documentation
        env:
          CONCORD_HEX_BUILD: '1'
          MIX_ENV: prod
        working-directory: apps/concord
        run: mix docs

      - name: Publish Concord to Hex.pm
        env:
          CONCORD_HEX_BUILD: '1'
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        working-directory: apps/concord
        run: mix hex.publish --yes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Concord v${{ needs.version.outputs.version }}

            All umbrella packages are published to Hex.pm at the same version:

            - [`concord`](https://hex.pm/packages/concord/${{ needs.version.outputs.version }})
            - [`ex_turso`](https://hex.pm/packages/ex_turso/${{ needs.version.outputs.version }})
            - [`viewstamped_replication`](https://hex.pm/packages/viewstamped_replication/${{ needs.version.outputs.version }})

            ### Installation

            ```elixir
            def deps do
              [
                {:concord, "${{ needs.version.outputs.version }}"}
              ]
            end
            ```

            ### Features

            - Embedded distributed key-value store for Elixir
            - Viewstamped Replication for strong consistency
            - Secondary indexes with declarative extractors
            - TTL support, compression, and bulk operations
            - Backup/restore and snapshot support
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
