name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Erlang/OTP
      uses: erlef/setup-beam@v1
      with:
        otp-version: '27'
        elixir-version: '1.18'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
          apps/ex_turso/native/ex_turso/target
        key: ${{ runner.os }}-mix-release-${{ hashFiles('**/mix.lock') }}

    - name: Install dependencies
      run: mix deps.get

    - name: Compile project
      env:
        MIX_ENV: test
      run: mix compile --warnings-as-errors

    - name: Run tests
      env:
        MIX_ENV: test
      run: mix test

  publish-vsr:
    name: Publish VSR to Hex.pm
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Erlang/OTP
      uses: erlef/setup-beam@v1
      with:
        otp-version: '27'
        elixir-version: '1.18'

    - name: Install dependencies
      run: mix deps.get

    - name: Publish VSR to Hex.pm
      env:
        HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      working-directory: apps/viewstamped_replication
      run: |
        VSR_VERSION=$(sed -n 's/^[[:space:]]*version: "\([^"]*\)",/\1/p' mix.exs | head -1)
        test -n "$VSR_VERSION"

        if mix hex.info viewstamped_replication "$VSR_VERSION" >/dev/null 2>&1; then
          echo "viewstamped_replication $VSR_VERSION is already published"
        else
          mix hex.publish --yes
        fi

  publish-ex-turso:
    name: Publish ExTurso to Hex.pm
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Erlang/OTP
      uses: erlef/setup-beam@v1
      with:
        otp-version: '27'
        elixir-version: '1.18'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install native build dependencies
      run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

    - name: Install dependencies
      run: mix deps.get

    - name: Publish ExTurso to Hex.pm
      env:
        HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        EX_TURSO_BUILD: "1"
      working-directory: apps/ex_turso
      run: |
        if mix hex.info ex_turso 0.5.0 >/dev/null 2>&1; then
          echo "ex_turso 0.5.0 is already published"
        else
          mix hex.publish --yes
        fi

  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: [publish-vsr, publish-ex-turso]
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF_NAME#v}"
        else
          # Use workflow dispatch input
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"

    - name: Setup Erlang/OTP
      uses: erlef/setup-beam@v1
      with:
        otp-version: '27'
        elixir-version: '1.18'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
          apps/ex_turso/native/ex_turso/target
        key: ${{ runner.os }}-mix-release-${{ hashFiles('**/mix.lock') }}

    - name: Install dependencies
      run: mix deps.get

    - name: Update Concord version
      run: |
        sed -i "s/version: \".*\"/version: \"${{ steps.version.outputs.version }}\"/" apps/concord/mix.exs
        echo "Updated apps/concord/mix.exs:"
        grep "version:" apps/concord/mix.exs

    - name: Compile project
      env:
        MIX_ENV: prod
      run: mix compile

    - name: Generate documentation
      env:
        MIX_ENV: prod
      working-directory: apps/concord
      run: mix docs

    - name: Install Hex package dependencies
      env:
        MIX_ENV: prod
        CONCORD_HEX_BUILD: "1"
      working-directory: apps/concord
      run: mix deps.get

    - name: Publish to Hex.pm
      env:
        MIX_ENV: prod
        HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        CONCORD_HEX_BUILD: "1"
      working-directory: apps/concord
      run: mix hex.publish --yes

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        generate_release_notes: true
        body: |
          ## Concord v${{ steps.version.outputs.version }}

          ### Installation

          Add `concord` to your dependencies in `mix.exs`:

          ```elixir
          def deps do
            [
              {:concord, "~> ${{ steps.version.outputs.version }}"}
            ]
          end
          ```

          ### Documentation

          - [HexDocs](https://hexdocs.pm/concord/${{ steps.version.outputs.version }})
          - [Hex.pm Package](https://hex.pm/packages/concord/${{ steps.version.outputs.version }})

          ### Features

          - Embedded distributed key-value store for Elixir
          - Viewstamped Replication for strong consistency
          - Secondary indexes with declarative extractors
          - TTL support, compression, and bulk operations
          - Backup/restore and snapshot support
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
